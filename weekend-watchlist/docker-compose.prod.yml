version: '3.8'

services:
  web:
    image: nginx:alpine
    container_name: weekend_watchlist_web
    restart: unless-stopped
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf
    expose:
      - "80"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: weekend_watchlist_tunnel
    restart: unless-stopped
    command: tunnel --url http://web:80
    depends_on:
      - web
