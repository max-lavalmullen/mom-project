version: '3.8'

services:
  # 1. The Web App (Frontend + Backend)
  app:
    image: node:18-alpine
    container_name: weekend_watchlist_app
    working_dir: /app
    restart: unless-stopped
    volumes:
      - ./:/app
      - /app/node_modules
    # Install dependencies and start the preview server
    command: sh -c "npm install && npm run build && npm run preview -- --host --port 8080"
    expose:
      - "8080"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}

  # 2. The Public Tunnel (Cloudflare)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: weekend_watchlist_tunnel
    restart: unless-stopped
    command: tunnel --url http://app:8080
    depends_on:
      - app
